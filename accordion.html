<!DOCTYPE html>
<html lang="en">
	<head>
	<meta charset="utf-8">
		<title>Accordion Solitaire</title>
		<style>
			body {
				background-color: green;
				color: white;
			}
			div#intro {
				position: relative;
				max-width: 1040px;
				margin-bottom: 10px;
			}
			div#buttons {
				max-width: fit-content;
				margin-left: auto;
				margin-right: auto;
			}
			div#cards {
				position: relative;
			}
		</style>
	</head>
	<body>
		<div id="intro">
			<h1 id="title">Accordion Solitaire</h1>
			<p id="instructions">The aim of the game is to stack all of the cards on top of each other at the very left-most position. A card stack may be moved one or three places to the left. A move is only allowed if a card stack is placed on another with either a matching value or suit on top. Good luck.</p>
			<div id="buttons">
				<button id="newGame">New Game</button>
				<button id="undo">Undo</button>
			</div>
		</div>
